<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="stylesheet" href="../style/shared.css">
  <link rel="stylesheet" href="../style/gallery.css">
</head>
<body>

  <header>
    <h1 id="gallery-title">Gallery</h1>
    <p  id="gallery-description"></p>
    <a href="../index.html" class="btn">← Home</a>
  </header>

  <div class="gallery" id="gallery"></div>

  <div id="lightbox">
    <span   id="lightbox-close">&times;</span>
    <button id="lightbox-prev">&#8249;</button>
    <img    id="lightbox-img" alt="Expanded photo">
    <button id="lightbox-next">&#8250;</button>
    <span   id="lightbox-counter"></span>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search);
    const galleryName = params.get("gallery") || "default_gallery";

    const lightbox        = document.getElementById("lightbox");
    const lightboxImg     = document.getElementById("lightbox-img");
    const lightboxClose   = document.getElementById("lightbox-close");
    const lightboxPrev    = document.getElementById("lightbox-prev");
    const lightboxNext    = document.getElementById("lightbox-next");
    const lightboxCounter = document.getElementById("lightbox-counter");
    const galleryDiv      = document.getElementById("gallery");

    let allPhotos      = [];
    let lightboxIndex  = 0;

    function openLightbox(index) {
      lightboxIndex = index;
      updateLightbox();
      lightbox.classList.add("open");
    }

    function updateLightbox() {
      lightboxImg.src           = allPhotos[lightboxIndex];
      lightboxCounter.textContent = `${lightboxIndex + 1} / ${allPhotos.length}`;
      lightboxPrev.disabled     = lightboxIndex === 0;
      lightboxNext.disabled     = lightboxIndex === allPhotos.length - 1;
    }

    lightboxClose.onclick = () => { lightbox.classList.remove("open"); };
    lightbox.onclick      = e  => { if (e.target === lightbox) lightbox.classList.remove("open"); };
    lightboxPrev.onclick  = e  => { e.stopPropagation(); lightboxIndex--; updateLightbox(); };
    lightboxNext.onclick  = e  => { e.stopPropagation(); lightboxIndex++; updateLightbox(); };

    document.addEventListener("keydown", e => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "ArrowLeft"  && lightboxIndex > 0)                         { lightboxIndex--; updateLightbox(); }
      if (e.key === "ArrowRight" && lightboxIndex < allPhotos.length - 1)      { lightboxIndex++; updateLightbox(); }
      if (e.key === "Escape") lightbox.classList.remove("open");
    });

    fetch(`../data/${galleryName}.json`)
      .then(res => {
        if (!res.ok) throw new Error("Gallery JSON not found");
        return res.json();
      })
      .then(data => {
        document.title = data.title || "Gallery";
        document.getElementById("gallery-title").textContent       = data.title || "Gallery";
        document.getElementById("gallery-description").textContent = data.description || "";

        allPhotos = data.photos.map(photo =>
          photo.url ?? `../images/${galleryName.replace("_gallery", "")}/${photo.file}`
        );

        allPhotos.forEach((src, i) => {
          const img   = document.createElement("img");
          img.src     = src;
          img.alt     = data.photos[i].caption || "";
          img.loading = "lazy";
          img.addEventListener("click", () => openLightbox(i));
          galleryDiv.appendChild(img);
        });
      })
      .catch(err => {
        document.getElementById("gallery-title").textContent       = "Gallery not found";
        document.getElementById("gallery-description").textContent = "";
        console.error(err);
      });
  </script>

</body>
</html>
