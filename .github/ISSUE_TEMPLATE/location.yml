name: New Location
description: Create a new location
title: '[LOCATION]'
labels:
- location
body:
- type: input
  id: new_location
  attributes:
    label: New Location
    description: Enter the location name here.
    placeholder: e.g., Bejing, China
  validations:
    required: true
- type: input
  id: lat
  attributes:
    label: Latitude
    description: Enter the latitude here.
    placeholder: '41.8967'
  validations:
    required: true
- type: input
  id: lng
  attributes:
    label: Longitude
    description: Enter the longitude here.
    placeholder: '12.4822'
  validations:
    required: true
- type: dropdown
  id: insert_after
  attributes:
    label: Insert After
    description: The new location will be placed after the selected location.
    options:
    - Melbourne, Australia
    - Istanbul, Turkey
    - "Tiran\xEB, Albania"
    - "Kor\xE7\xEB, Albania"
    - Berat, Albania
    - The Accursed Mountains
    - Budva, Montenegro
    - Podgorica, Montenegro
    - Ljubljana, Slovenia
    - Bohinj, Slovenia
    - Julian Alps, Slovenia
    - Vipava Valley, Slovenia
    - Trieste, Italy
    - Valpolicella, Italy
    - Dolomites, Italy
    - Munich, Germany
    - Vienna, Austria
    - Tatra Mountains, Slovakia
    - Krakow, Poland
    - Prague, Czechia
    - Georgia
    - Armenia
    - Kazakhstan
    - Uzbekistan
    - India
    - Taiwan
    - China
    - Thailand
  validations:
    required: true
