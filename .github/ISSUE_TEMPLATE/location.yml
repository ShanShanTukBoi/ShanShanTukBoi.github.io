name: New Location
description: Create a new location
title: '[LOCATION]'
labels:
- location
body:
- type: input
  id: new_location
  attributes:
    label: New Location
    description: Enter the location name here.
    placeholder: e.g., Bejing, China
  validations:
    required: true
- type: input
  id: lat
  attributes:
    label: Latitude
    description: Enter the latitude here.
    placeholder: '41.8967'
  validations:
    required: true
- type: input
  id: lng
  attributes:
    label: Longitude
    description: Enter the longitude here.
    placeholder: '12.4822'
  validations:
    required: true
